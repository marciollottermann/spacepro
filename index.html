<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacepro - Teclott do Brasil</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#00529B">
    <style>
        :root {
            --primary: #00529B;
            --bg: #F4F6F9;
            --card: #FFFFFF;
            --text: #333333;
            --success: #28a745;
            --danger: #dc3545;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background-color: var(--card);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 20px;
        }
        .header {
            background-color: var(--primary);
            color: white;
            text-align: center;
            padding: 25px 15px;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
        }
        .header p {
            margin: 5px 0 0 0;
            font-size: 14px;
            letter-spacing: 2px;
            opacity: 0.9;
        }
        .content {
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .status-container {
            background-color: #F0F4F8;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 16px;
        }
        .ble-badge {
            color: #00529B;
            font-size: 13px;
            font-weight: bold;
        }
        .btn-connect {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
            width: 100%;
        }
        .btn-connect:active { opacity: 0.8; }
        
        /* Painel de Controle de Relé oculto por padrão */
        .control-panel {
            display: none;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }
        .btn-action {
            border: none;
            border-radius: 10px;
            padding: 18px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-on { background-color: var(--success); }
        .btn-off { background-color: var(--danger); }
        .btn-action:active { transform: scale(0.98); }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #888888;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Teclott do Brasil</h1>
        <p>SPACEPRO</p>
    </div>
    <div class="content">
        <div class="status-container">
            <span id="status-text">Status: ❌ Desconectado</span>
            <span class="ble-badge">BLE v5.2</span>
        </div>
        
        <button id="btn-bluetooth" class="btn-connect" onclick="conectarBluetooth()">
            <span>🔌 Conectar via Bluetooth</span>
        </button>

        <div id="panel-control" class="control-panel">
            <button class="btn-action btn-on" onclick="enviarComando('1')">⚡ LIGAR RELÉ</button>
            <button class="btn-action btn-off" onclick="enviarComando('0')">💤 DESLIGAR RELÉ</button>
        </div>
    </div>
</div>

<div class="footer">
    © Teclott do Brasil 2026 | Spacepro Hardware
</div>

<script>
    // Configurações UUID emparelhadas com o ESP32-C6
    const SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
    const CHARACTERISTIC_UUID = 'beb5483e-36c1-4688-b7f5-ea07361b26a8';

    let meuDispositivo = null;
    let minhaCaracteristica = null;

    async function conectarBluetooth() {
        const statusText = document.getElementById("status-text");
        const btnConnect = document.getElementById("btn-bluetooth");
        const panelControl = document.getElementById("panel-control");

        try {
            statusText.innerText = "🔍 Buscando...";
            
            meuDispositivo = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'Spacepro' }],
                optionalServices: [SERVICE_UUID]
            });

            statusText.innerText = "🔌 Conectando...";
            const servidor = await meuDispositivo.gatt.connect();

            statusText.innerText = "🔍 Localizando Serviço...";
            const servico = await servidor.getPrimaryService(SERVICE_UUID);

            statusText.innerText = "🔍 Mapeando Canal...";
            minhaCaracteristica = await servico.getCharacteristic(CHARACTERISTIC_UUID);

            statusText.innerHTML = "Status: 🟢 Conectado";
            btnConnect.style.display = "none";     // Oculta botão conectar
            panelControl.style.display = "flex";   // Mostra botões de controle

            // Monitora desconexão acidental
            meuDispositivo.addEventListener('gattserverdisconnected', () => {
                statusText.innerHTML = "Status: ❌ Desconectado";
                btnConnect.style.display = "flex";
                panelControl.style.display = "none";
                minhaCaracteristica = null;
            });

        } catch (error) {
            console.error("Erro Bluetooth:", error);
            statusText.innerHTML = "Status: ❌ Falha";
            alert("Falha ao parear: " + error.message);
        }
    }

    async function enviarComando(valor) {
        if (!minhaCaracteristica) {
            alert("Dispositivo desconectado!");
            return;
        }
        try {
            // Converte string '1' ou '0' em array de bytes
            const dados = new TextEncoder().encode(valor);
            await minhaCaracteristica.writeValue(dados);
            console.log("Comando enviado: " + valor);
        } catch (error) {
            console.error("Erro ao enviar dado:", error);
            alert("Erro de transmissão.");
        }
    }
</script>

</body>
</html>
