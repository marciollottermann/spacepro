const SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
const CHARACTERISTIC_UUID = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';

let meuDispositivo = null;
let minhaCaracteristica = null;

async function conectarBluetooth() {
    const statusText = document.getElementById("status-text"); // Ajuste se o ID do seu texto for diferente
    
    try {
        statusText.innerText = "🔄 Buscando dispositivo...";
        
        meuDispositivo = await navigator.bluetooth.requestDevice({
            filters: [{ name: 'Shelly-C6-BLE' }],
            optionalServices: [SERVICE_UUID]
        });

        statusText.innerText = "🔄 Conectando ao servidor GATT...";
        const servidor = await meuDispositivo.gatt.connect();

        statusText.innerText = "🔄 Buscando serviço principal...";
        const servico = await servidor.getPrimaryService(SERVICE_UUID);

        statusText.innerText = "🔄 Mapeando característica...";
        minhaCaracteristica = await servico.getCharacteristic(CHARACTERISTIC_UUID);

        statusText.innerHTML = "🟢 Conectado com SUCESSO! BLE v5.2";
        console.log("Sucesso! Aparelho pronto para receber comandos.");

    } catch (error) {
        console.error("Erro na conexão: ", error);
        statusText.innerText = "❌ Falha ao conectar. Tente novamente.";
    }
}

// Função auxiliar que você pode chamar em botões de "Ligar" e "Desligar" na interface
async function enviarComandoRele(valor) {
    if (!minhaCaracteristica) {
        alert("Dispositivo não conectado!");
        return;
    }
    try {
        // Envia '1' para ligar ou '0' para desligar
        const dados = new TextEncoder().encode(valor);
        await minhaCaracteristica.writeValueWithoutResponse(dados);
        console.log(`Comando ${valor} enviado com sucesso!`);
    } catch (error) {
        console.error("Erro ao enviar comando: ", error);
    }
}
